    <rect width="12" height="19" x="1" y="1" rx="2" stroke-width="0.5" opacity="0.6" />
    
    <rect width="10" height="5" x="2" y="2" rx="1.5" fill="url(#motazin-gradient-dark)" stroke="url(#motazin-highlight-dark)" fill-opacity="0.15" stroke-width="0.8" />
    <path d="M4 4.5h3 M9 4.5h1" stroke-width="1" stroke="url(#motazin-highlight-dark)" />
    
    <g fill="url(#motazin-gradient-dark)" opacity="0.9" stroke="none">
