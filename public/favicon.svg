  <path d="M 17 3 C 21 4.5, 25 2, 28 6" stroke-width="1.5" fill="none" stroke-linecap="round" />

  <!-- Left Bowl -->
  <path d="M4 6 L1 18 M4 6 L7 18" stroke-width="1" stroke="url(#motazin-gradient-dark)" fill="none" opacity="0.7" />
  <path d="M1 18 c 0 3.5, 6 3.5, 6 0 z" fill="url(#motazin-gradient-dark)" stroke="none" opacity="0.85" />
  <path d="M1 18 c 1.5 1, 4.5 1, 6 0" stroke-width="0.8" stroke="#080c14" fill="none" opacity="0.5" />
  
  <!-- Right Bowl -->
  <path d="M28 6 L25 18 M28 6 L31 18" stroke-width="1" stroke="url(#motazin-gradient-dark)" fill="none" opacity="0.7" />
  <path d="M25 18 c 0 3.5, 6 3.5, 6 0 z" fill="url(#motazin-gradient-dark)" stroke="none" opacity="0.85" />
  <path d="M25 18 c 1.5 1, 4.5 1, 6 0" stroke-width="0.8" stroke="#080c14" fill="none" opacity="0.5" />

  <g transform="translate(9, 5)">
